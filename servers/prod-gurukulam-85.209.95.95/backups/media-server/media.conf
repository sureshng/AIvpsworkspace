server {
    server_name media.appofcag.site;

    # Serve files directly from /var/www/appmedia
    root /var/www/appmedia;

    # Default: only serve files; no directory listing
    autoindex off;

    # Allow images, icons, webp/avif/svg, etc.
    location / {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;

        # Long cache; use file-name hashes when you need instant busting
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";

        try_files $uri =404;
    }

    # Optional: restrict methods for extra safety
    if ($request_method !~ ^(GET|HEAD|OPTIONS)$ ) { return 405; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/media.appofcag.site/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/media.appofcag.site/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = media.appofcag.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name media.appofcag.site;
    return 404; # managed by Certbot


}